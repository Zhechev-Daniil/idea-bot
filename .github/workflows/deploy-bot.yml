name: Test Bot on Push

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'bot/**'
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd bot
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          cd bot
          # Останавливаем только на критических ошибках (E9, F63, F7, F82)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check imports
        run: |
          cd bot
          python -c "import processor; import claude_client; import handlers; import db; print('All imports OK')"
        env:
          TELEGRAM_BOT_TOKEN: test_token
          ANTHROPIC_API_KEY: test_key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test_key

# ──────────────────────────────────────────────
# Деплой бота на Railway происходит автоматически:
# Railway подключается к GitHub репо и деплоит
# при каждом push в main без дополнительных воркфлоу.
# Настройка: Railway Dashboard → New Project → Deploy from GitHub
# ──────────────────────────────────────────────
