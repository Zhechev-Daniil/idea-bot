<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бот с идеями — Дашборд гипотез</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2d3148;
    --text: #e8eaf0;
    --text-muted: #8b90a8;
    --accent: #6c63ff;
    --accent-dim: #3d3878;
    --green: #22c55e;
    --green-dim: #14532d;
    --red: #ef4444;
    --red-dim: #7f1d1d;
    --yellow: #f59e0b;
    --yellow-dim: #78350f;
    --blue: #3b82f6;
    --blue-dim: #1e3a5f;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

  /* Sidebar */
  .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
  .sidebar-logo { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .sidebar-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; }
  .stat-num { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.yellow { color: var(--yellow); }
  .stat-num.blue { color: var(--blue); }

  .filter-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .filter-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: all 0.15s; }
  .chip:hover, .chip.active { background: var(--accent); border-color: var(--accent); color: white; }
  .chip.status-in_progress { border-color: var(--blue); color: var(--blue); }
  .chip.status-in_progress.active { background: var(--blue); color: white; }
  .chip.status-success { border-color: var(--green); color: var(--green); }
  .chip.status-success.active { background: var(--green); color: white; }
  .chip.status-failure { border-color: var(--red); color: var(--red); }
  .chip.status-failure.active { background: var(--red); color: white; }

  .hyp-list { flex: 1; overflow-y: auto; padding: 8px; }
  .hyp-item { padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; transition: all 0.15s; }
  .hyp-item:hover { background: var(--surface2); }
  .hyp-item.active { background: var(--accent-dim); border-color: var(--accent); }
  .hyp-item-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; line-height: 1.3; }
  .hyp-item-meta { display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-pending { background: var(--text-muted); }
  .dot-in_progress { background: var(--blue); }
  .dot-success { background: var(--green); }
  .dot-failure { background: var(--red); }
  .dot-archived { background: var(--text-muted); opacity: 0.4; }
  .hyp-item-date { font-size: 10px; color: var(--text-muted); }

  /* Main content */
  .main-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .main-title { font-size: 18px; font-weight: 700; }
  .main-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #5b52e0; }
  .btn-success { background: var(--green); color: white; }
  .btn-danger { background: var(--red); color: white; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  .content-area { flex: 1; padding: 24px; }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; color: var(--text-muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 13px; max-width: 300px; }

  /* Hypothesis detail */
  .hyp-detail { display: none; }
  .hyp-detail.visible { display: block; }

  .detail-header { margin-bottom: 20px; }
  .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; }
  .badge-pending { background: var(--surface2); color: var(--text-muted); }
  .badge-in_progress { background: var(--blue-dim); color: var(--blue); }
  .badge-success { background: var(--green-dim); color: var(--green); }
  .badge-failure { background: var(--red-dim); color: var(--red); }
  .badge-archived { background: var(--surface2); color: var(--text-muted); opacity: 0.6; }
  .tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; background: var(--surface2); color: var(--text-muted); }

  /* Grid layout */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .detail-grid.full { grid-template-columns: 1fr; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 8px; }
  .card-value { font-size: 13px; line-height: 1.6; }
  .card-value.large { font-size: 28px; font-weight: 700; color: var(--accent); }

  /* Metric progress */
  .metric-progress { margin-top: 10px; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Tasks */
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .task-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-check.done { background: var(--green); border-color: var(--green); }
  .task-check.done::after { content: '✓'; font-size: 10px; color: white; }

  /* Status actions */
  .status-actions { display: flex; gap: 8px; margin-bottom: 20px; }

  /* Metric update form */
  .metric-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .form-row { display: flex; gap: 10px; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text-muted); }
  .form-input, .form-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 8px 10px; font-size: 13px; outline: none; width: 100%; }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }

  /* Chart */
  .chart-container { position: relative; height: 200px; }

  /* Updates log */
  .updates-log { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
  .update-item { padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); }
  .update-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
  .update-value { font-size: 13px; font-weight: 600; }
  .update-note { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Chat panel */
  /* Copy context button */
  .copy-ctx-btn { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: white; border: none; border-radius: 100px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 7px; box-shadow: 0 4px 16px rgba(108,99,255,0.4); transition: all 0.2s; z-index: 50; }
  .copy-ctx-btn:hover { background: #5b52e0; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.5); }
  .copy-ctx-btn.copied { background: var(--green); box-shadow: 0 4px 16px rgba(34,197,94,0.4); }

  /* Source link */
  .source-link { color: var(--accent); text-decoration: none; font-size: 12px; }
  .source-link:hover { text-decoration: underline; }

  /* Hypothesis statement */
  .hypothesis-statement { font-size: 14px; line-height: 1.7; color: var(--text); background: var(--accent-dim); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin-bottom: 4px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; font-size: 13px; z-index: 1000; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* Config modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 480px; max-width: 95vw; }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div id="config-modal" class="modal-overlay">
  <div class="modal">
    <h2>⚙️ Настройка подключения</h2>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="form-group">
        <label class="form-label">Supabase URL</label>
        <input class="form-input" id="cfg-url" placeholder="https://xxx.supabase.co">
      </div>
      <div class="form-group">
        <label class="form-label">Supabase Anon Key</label>
        <input class="form-input" id="cfg-key" placeholder="eyJhbGci...">
      </div>
      <div class="form-group">
        <label class="form-label">Anthropic API Key (для чата с Opus)</label>
        <input class="form-input" id="cfg-anthropic" placeholder="sk-ant-...">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveConfig()">Сохранить и подключиться</button>
    </div>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">💡 Идеи&nbsp;<span style="opacity:0.4;font-weight:400">→</span>&nbsp;Гипотезы</div>
      <div class="sidebar-stats">
        <div class="stat-card">
          <div class="stat-num blue" id="stat-active">0</div>
          <div class="stat-label">В работе</div>
        </div>
        <div class="stat-card">
          <div class="stat-num green" id="stat-success">0</div>
          <div class="stat-label">Успех</div>
        </div>
        <div class="stat-card">
          <div class="stat-num red" id="stat-failure">0</div>
          <div class="stat-label">Провал</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">Всего</div>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Статус</div>
      <div class="filter-chips" id="status-filters">
        <span class="chip active" data-filter="all" onclick="setFilter('all',this)">Все</span>
        <span class="chip status-in_progress" data-filter="in_progress" onclick="setFilter('in_progress',this)">В работе</span>
        <span class="chip" data-filter="pending" onclick="setFilter('pending',this)">Ожидает</span>
        <span class="chip status-success" data-filter="success" onclick="setFilter('success',this)">Успех</span>
        <span class="chip status-failure" data-filter="failure" onclick="setFilter('failure',this)">Провал</span>
      </div>
    </div>

    <div class="hyp-list" id="hyp-list">
      <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">Загрузка...</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="main-title">Дашборд гипотез</div>
        <div class="main-subtitle" id="main-subtitle">Выбери гипотезу из списка</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="showConfig()">⚙️ Настройки</button>
        <button class="btn btn-ghost" onclick="loadHypotheses()">↻ Обновить</button>
      </div>
    </div>

    <div class="content-area" id="content-area">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">🧪</div>
        <h3>Гипотез пока нет</h3>
        <p>Отправь боту ссылку на видео, статью или голосовое — и он сформирует первую гипотезу</p>
      </div>

      <div class="hyp-detail" id="hyp-detail">
        <!-- динамически заполняется -->
      </div>
    </div>

  </div>
</div>

<!-- Кнопка копирования контекста для Claude -->
<button class="copy-ctx-btn" id="copy-ctx-btn" onclick="copyContextForClaude()">
  <span>🤖</span> Скопировать контекст для Claude
</button>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
let supabase = null;
let hypotheses = [];
let currentHypId = null;
let currentFilter = 'all';
let chartInstance = null;

function loadConfig() {
  return {
    url: localStorage.getItem('sb_url') || '',
    key: localStorage.getItem('sb_key') || '',
    anthropic: localStorage.getItem('anthropic_key') || ''
  };
}

function saveConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  const anthropic = document.getElementById('cfg-anthropic').value.trim();
  if (!url || !key) { showToast('Заполни URL и Key', 'error'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  if (anthropic) localStorage.setItem('anthropic_key', anthropic);
  document.getElementById('config-modal').style.display = 'none';
  initSupabase(url, key);
  loadHypotheses();
}

function showConfig() {
  const cfg = loadConfig();
  document.getElementById('cfg-url').value = cfg.url;
  document.getElementById('cfg-key').value = cfg.key;
  document.getElementById('cfg-anthropic').value = cfg.anthropic;
  document.getElementById('config-modal').style.display = 'flex';
}

function initSupabase(url, key) {
  const { createClient } = window.supabase;
  supabase = createClient(url, key);
}

// ============================================================
// DATA
// ============================================================
async function loadHypotheses() {
  if (!supabase) return;
  const { data, error } = await supabase
    .from('hypotheses')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { showToast('Ошибка загрузки: ' + error.message, 'error'); return; }
  hypotheses = data || [];
  renderSidebar();
  updateStats();
  if (currentHypId) {
    const found = hypotheses.find(h => h.id === currentHypId);
    if (found) showHypothesis(found);
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = hypotheses.length;
  document.getElementById('stat-active').textContent = hypotheses.filter(h => h.status === 'in_progress').length;
  document.getElementById('stat-success').textContent = hypotheses.filter(h => h.status === 'success').length;
  document.getElementById('stat-failure').textContent = hypotheses.filter(h => h.status === 'failure').length;
}

// ============================================================
// SIDEBAR
// ============================================================
function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('#status-filters .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('hyp-list');
  let filtered = currentFilter === 'all' ? hypotheses : hypotheses.filter(h => h.status === currentFilter);
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">Нет гипотез</div>';
    return;
  }
  list.innerHTML = filtered.map(h => `
    <div class="hyp-item ${currentHypId === h.id ? 'active' : ''}" onclick="showHypothesis(${JSON.stringify(h).replace(/"/g, '&quot;')})">
      <div class="hyp-item-title">${escHtml(h.title)}</div>
      <div class="hyp-item-meta">
        <div class="status-dot dot-${h.status}"></div>
        <span class="hyp-item-date">${statusLabel(h.status)} · ${fmtDate(h.created_at)}</span>
      </div>
    </div>
  `).join('');
}

// ============================================================
// HYPOTHESIS DETAIL
// ============================================================
async function showHypothesis(h) {
  currentHypId = h.id;
  renderSidebar();

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('hyp-detail').classList.add('visible');

  document.getElementById('main-title').textContent = h.title;
  document.getElementById('main-subtitle').textContent = `Создана ${fmtDate(h.created_at)} · ${statusLabel(h.status)}`;

  // Загружаем обновления метрик
  const { data: updates } = await supabase
    .from('metric_updates')
    .select('*')
    .eq('hypothesis_id', h.id)
    .order('date', { ascending: true });

  const { data: notes } = await supabase
    .from('hypothesis_notes')
    .select('*')
    .eq('hypothesis_id', h.id)
    .order('created_at', { ascending: false });

  renderDetail(h, updates || [], notes || []);
}

function renderDetail(h, updates, notes) {
  const tasks = Array.isArray(h.tasks) ? h.tasks : [];
  const tags = Array.isArray(h.tags) ? h.tags : [];
  const secondaryMetrics = Array.isArray(h.secondary_metrics) ? h.secondary_metrics : [];

  // Прогресс метрики
  const baseline = parseFloat(h.primary_metric_baseline) || 0;
  const target = parseFloat(h.primary_metric_target) || 0;
  const latestUpdate = updates.filter(u => u.metric_name === h.primary_metric_name).slice(-1)[0];
  const current = latestUpdate ? parseFloat(latestUpdate.metric_value) : baseline;
  const progress = target > baseline ? Math.min(100, ((current - baseline) / (target - baseline)) * 100) : 0;

  const detail = document.getElementById('hyp-detail');
  detail.innerHTML = `
    <!-- Header -->
    <div class="detail-header">
      <div class="detail-title">${escHtml(h.title)}</div>
      <div class="detail-meta">
        <span class="badge badge-${h.status}">${statusEmoji(h.status)} ${statusLabel(h.status)}</span>
        ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
        ${h.source_url ? `<a class="source-link" href="${h.source_url}" target="_blank">↗ Источник</a>` : ''}
      </div>
    </div>

    <!-- Status actions -->
    <div class="status-actions">
      ${h.status !== 'in_progress' ? `<button class="btn btn-primary" onclick="updateStatus('${h.id}', 'in_progress')">▶ В работу</button>` : ''}
      ${h.status !== 'success' ? `<button class="btn btn-success" onclick="updateStatus('${h.id}', 'success')">✓ Подтвердить</button>` : ''}
      ${h.status !== 'failure' ? `<button class="btn btn-danger" onclick="updateStatus('${h.id}', 'failure')">✕ Опровергнуть</button>` : ''}
      ${h.status !== 'archived' ? `<button class="btn btn-ghost" onclick="updateStatus('${h.id}', 'archived')">Архив</button>` : ''}
    </div>

    <!-- Hypothesis statement -->
    <div class="card" style="margin-bottom:16px;">
      <div class="card-label">Гипотеза</div>
      <div class="hypothesis-statement">${escHtml(h.hypothesis_statement || '—')}</div>
      ${h.source_summary ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;"><strong>Источник:</strong> ${escHtml(h.source_summary)}</div>` : ''}
    </div>

    <!-- Metrics row -->
    <div class="detail-grid" style="margin-bottom:16px;">
      <div class="card">
        <div class="card-label">Главная метрика — ${escHtml(h.primary_metric_name || '—')}</div>
        <div class="card-value large">${current} <span style="font-size:16px;color:var(--text-muted)">${h.primary_metric_unit || ''}</span></div>
        ${target ? `
          <div class="metric-progress">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:4px;">
              <span>Прогресс к цели</span><span>${Math.round(progress)}%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${progress >= 100 ? 'var(--green)' : 'var(--accent)'}"></div></div>
            <div class="progress-labels"><span>Старт: ${baseline}</span><span>Цель: ${target}</span></div>
          </div>
        ` : ''}
      </div>

      <div class="card">
        <div class="card-label">Детали эксперимента</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="font-size:12px;"><span style="color:var(--text-muted);">Аудитория:</span> ${escHtml(h.audience || '—')}</div>
          <div style="font-size:12px;"><span style="color:var(--text-muted);">Срок:</span> ${h.duration_days ? h.duration_days + ' дней' : '—'}</div>
          <div style="font-size:12px;"><span style="color:var(--text-muted);">Дедлайн:</span> ${h.deadline ? fmtDate(h.deadline) : '—'}</div>
          <div style="font-size:12px;"><span style="color:var(--text-muted);">Уверенность:</span> ${confidenceLabel(h.confidence_level)}</div>
          <div style="font-size:12px;"><span style="color:var(--text-muted);">Успех:</span> ${escHtml(h.success_criteria || '—')}</div>
        </div>
      </div>
    </div>

    <!-- Chart + Tasks -->
    <div class="detail-grid" style="margin-bottom:16px;">
      <div class="card">
        <div class="card-label">Динамика метрики</div>
        ${updates.length > 0 ? `<div class="chart-container"><canvas id="metric-chart"></canvas></div>` : `<div style="color:var(--text-muted);font-size:12px;padding:20px 0;text-align:center;">Нет данных. Добавь первое обновление ↓</div>`}
      </div>

      <div class="card">
        <div class="card-label">Задачи</div>
        <ul class="task-list">
          ${tasks.map((t, i) => `
            <li class="task-item">
              <div class="task-check" id="task-${i}" onclick="toggleTask(${i})"></div>
              <span>${escHtml(t)}</span>
            </li>
          `).join('')}
          ${!tasks.length ? '<li style="color:var(--text-muted);font-size:12px;">Задачи не заданы</li>' : ''}
        </ul>
      </div>
    </div>

    <!-- Add metric update -->
    <div class="metric-form">
      <div class="card-label" style="margin-bottom:12px;">📊 Добавить обновление метрики</div>
      <div class="form-row">
        <div class="form-group" style="max-width:160px;">
          <label class="form-label">Дата</label>
          <input class="form-input" type="date" id="upd-date" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <div class="form-group" style="max-width:180px;">
          <label class="form-label">Метрика</label>
          <select class="form-select" id="upd-metric">
            <option value="${escHtml(h.primary_metric_name || '')}">${escHtml(h.primary_metric_name || 'Главная')}</option>
            ${secondaryMetrics.map(m => `<option value="${escHtml(m.name)}">${escHtml(m.name)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="max-width:120px;">
          <label class="form-label">Значение</label>
          <input class="form-input" type="number" id="upd-value" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Заметка</label>
          <input class="form-input" id="upd-note" placeholder="Опционально...">
        </div>
        <button class="btn btn-primary" onclick="addMetricUpdate('${h.id}', '${escHtml(h.primary_metric_name || '')}')">Добавить</button>
      </div>
    </div>

    <!-- Updates log -->
    ${updates.length > 0 ? `
      <div class="card" style="margin-bottom:16px;">
        <div class="card-label">История обновлений</div>
        <div class="updates-log">
          ${updates.slice().reverse().map(u => `
            <div class="update-item">
              <div class="update-meta">${fmtDate(u.date)} · ${escHtml(u.metric_name)}</div>
              <div class="update-value">${u.metric_value} ${h.primary_metric_unit || ''}</div>
              ${u.note ? `<div class="update-note">${escHtml(u.note)}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}

    <!-- Result (if done) -->
    ${(h.status === 'success' || h.status === 'failure') ? `
      <div class="card" style="margin-bottom:16px;border-color:${h.status === 'success' ? 'var(--green)' : 'var(--red)'};">
        <div class="card-label">Итог эксперимента</div>
        <textarea class="form-input" id="result-text" rows="3" placeholder="Что получилось? Почему сработало/не сработало?">${escHtml(h.result_summary || '')}</textarea>
        <button class="btn btn-ghost" style="margin-top:8px;" onclick="saveResult('${h.id}')">Сохранить итог</button>
      </div>
    ` : ''}
  `;

  // Render chart
  if (updates.length > 0) {
    setTimeout(() => renderChart(updates, h.primary_metric_name), 50);
  }

  // Load task states from localStorage
  tasks.forEach((_, i) => {
    const done = localStorage.getItem(`task_${h.id}_${i}`) === '1';
    if (done) {
      const el = document.getElementById(`task-${i}`);
      if (el) el.classList.add('done');
    }
  });
}

function renderChart(updates, metricName) {
  const canvas = document.getElementById('metric-chart');
  if (!canvas) return;
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const filtered = updates.filter(u => u.metric_name === metricName);
  if (!filtered.length) return;
  chartInstance = new Chart(canvas, {
    type: 'line',
    data: {
      labels: filtered.map(u => fmtDate(u.date)),
      datasets: [{
        data: filtered.map(u => u.metric_value),
        borderColor: '#6c63ff',
        backgroundColor: 'rgba(108,99,255,0.1)',
        tension: 0.3,
        fill: true,
        pointBackgroundColor: '#6c63ff',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b90a8', font: { size: 10 } }, grid: { color: '#2d3148' } },
        y: { ticks: { color: '#8b90a8', font: { size: 10 } }, grid: { color: '#2d3148' } }
      }
    }
  });
}

// ============================================================
// ACTIONS
// ============================================================
async function updateStatus(id, status) {
  const { error } = await supabase.from('hypotheses').update({ status }).eq('id', id);
  if (error) { showToast('Ошибка: ' + error.message, 'error'); return; }
  showToast(`Статус обновлён: ${statusLabel(status)}`, 'success');
  await loadHypotheses();
}

async function addMetricUpdate(hypId) {
  const date = document.getElementById('upd-date').value;
  const metric = document.getElementById('upd-metric').value;
  const value = parseFloat(document.getElementById('upd-value').value);
  const note = document.getElementById('upd-note').value.trim();
  if (!date || isNaN(value)) { showToast('Заполни дату и значение', 'error'); return; }
  const { error } = await supabase.from('metric_updates').insert({
    hypothesis_id: hypId, date, metric_name: metric, metric_value: value, note: note || null
  });
  if (error) { showToast('Ошибка: ' + error.message, 'error'); return; }
  showToast('Метрика добавлена', 'success');
  document.getElementById('upd-value').value = '';
  document.getElementById('upd-note').value = '';
  const h = hypotheses.find(h => h.id === hypId);
  if (h) {
    const { data: updates } = await supabase.from('metric_updates').select('*').eq('hypothesis_id', hypId).order('date');
    const { data: notes } = await supabase.from('hypothesis_notes').select('*').eq('hypothesis_id', hypId).order('created_at', { ascending: false });
    renderDetail(h, updates || [], notes || []);
  }
}

async function saveResult(id) {
  const summary = document.getElementById('result-text').value.trim();
  const { error } = await supabase.from('hypotheses').update({ result_summary: summary }).eq('id', id);
  if (error) { showToast('Ошибка: ' + error.message, 'error'); return; }
  showToast('Итог сохранён', 'success');
}

function toggleTask(i) {
  const el = document.getElementById(`task-${i}`);
  if (!el) return;
  const done = el.classList.toggle('done');
  localStorage.setItem(`task_${currentHypId}_${i}`, done ? '1' : '0');
}

// ============================================================
// COPY CONTEXT FOR CLAUDE
// Копирует структурированный контекст дашборда в буфер обмена.
// Вставь в Claude и задавай вопросы — он увидит все твои гипотезы.
// ============================================================
async function copyContextForClaude() {
  const today = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
  const lines = [];

  lines.push(`# Контекст: Дашборд гипотез`);
  lines.push(`Дата: ${today}\n`);

  // Статистика
  lines.push(`## Общая статистика`);
  lines.push(`- Всего гипотез: ${hypotheses.length}`);
  lines.push(`- В работе: ${hypotheses.filter(h => h.status === 'in_progress').length}`);
  lines.push(`- Ожидают: ${hypotheses.filter(h => h.status === 'pending').length}`);
  lines.push(`- Успех: ${hypotheses.filter(h => h.status === 'success').length}`);
  lines.push(`- Провал: ${hypotheses.filter(h => h.status === 'failure').length}\n`);

  // Если открыта конкретная гипотеза — даём полный контекст
  if (currentHypId) {
    const h = hypotheses.find(h => h.id === currentHypId);
    if (h) {
      lines.push(`## Открытая гипотеза: «${h.title}»`);
      lines.push(`**Статус:** ${statusLabel(h.status)}`);
      lines.push(`**Гипотеза:** ${h.hypothesis_statement || '—'}`);
      if (h.observation) lines.push(`**Наблюдение:** ${h.observation}`);
      if (h.change_to_test) lines.push(`**Что тестируем:** ${h.change_to_test}`);
      if (h.audience) lines.push(`**Аудитория:** ${h.audience}`);
      lines.push('');
      lines.push(`**Главная метрика:** ${h.primary_metric_name || '—'}`);
      lines.push(`  - Старт: ${h.primary_metric_baseline || '?'} → Цель: ${h.primary_metric_target || '?'} ${h.primary_metric_unit || ''}`);
      if (h.success_criteria) lines.push(`**Критерий успеха:** ${h.success_criteria}`);
      if (h.failure_criteria) lines.push(`**Критерий провала:** ${h.failure_criteria}`);
      if (h.deadline) lines.push(`**Дедлайн:** ${fmtDate(h.deadline)}`);
      if (h.confidence_level) lines.push(`**Уверенность:** ${confidenceLabel(h.confidence_level)}`);

      // Задачи
      const tasks = Array.isArray(h.tasks) ? h.tasks : [];
      if (tasks.length) {
        lines.push('\n**Задачи:**');
        tasks.forEach((t, i) => {
          const done = localStorage.getItem(`task_${h.id}_${i}`) === '1';
          lines.push(`  ${done ? '✅' : '⬜'} ${t}`);
        });
      }

      // Загружаем свежие обновления метрик
      try {
        const { data: updates } = await supabase
          .from('metric_updates')
          .select('*')
          .eq('hypothesis_id', h.id)
          .order('date', { ascending: false })
          .limit(5);

        if (updates && updates.length) {
          lines.push('\n**Последние обновления метрик:**');
          updates.forEach(u => {
            lines.push(`  - ${fmtDate(u.date)}: ${u.metric_name} = ${u.metric_value} ${h.primary_metric_unit || ''}${u.note ? ` (${u.note})` : ''}`);
          });
        }
      } catch (e) { /* нет данных — не критично */ }

      if (h.result_summary) {
        lines.push(`\n**Итог:** ${h.result_summary}`);
      }

      lines.push('');
    }
  }

  // Список всех активных гипотез
  const active = hypotheses.filter(h => ['in_progress', 'pending'].includes(h.status));
  if (active.length) {
    lines.push(`## Все активные гипотезы (${active.length})`);
    active.forEach(h => {
      lines.push(`- **${h.title}** [${statusLabel(h.status)}]`);
      if (h.hypothesis_statement) lines.push(`  ${h.hypothesis_statement}`);
    });
  }

  lines.push('\n---');
  lines.push('_Контекст скопирован с дашборда. Задай вопрос: интерпретация метрик, следующие шаги, приоритеты, корректировка гипотезы._');

  const text = lines.join('\n');

  try {
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-ctx-btn');
    btn.classList.add('copied');
    btn.innerHTML = '<span>✓</span> Скопировано — вставь в Claude';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<span>🤖</span> Скопировать контекст для Claude';
    }, 3000);
  } catch (e) {
    showToast('Не удалось скопировать: ' + e.message, 'error');
  }
}

// ============================================================
// HELPERS
// ============================================================
function statusLabel(s) {
  return { pending: 'Ожидает', in_progress: 'В работе', success: 'Успех', failure: 'Провал', archived: 'Архив' }[s] || s;
}
function statusEmoji(s) {
  return { pending: '⏳', in_progress: '🔵', success: '✅', failure: '❌', archived: '📦' }[s] || '';
}
function confidenceLabel(c) {
  return { low: '🟡 Низкая', medium: '🟠 Средняя', high: '🟢 Высокая' }[c] || c;
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
}
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
// INIT
// ============================================================
(function init() {
  const cfg = loadConfig();
  if (cfg.url && cfg.key) {
    document.getElementById('config-modal').style.display = 'none';
    initSupabase(cfg.url, cfg.key);
    loadHypotheses();
    // Автообновление каждые 30 сек
    setInterval(loadHypotheses, 30000);
  }
})();
</script>
